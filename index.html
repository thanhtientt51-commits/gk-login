<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江苏公考职位筛选系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:linear-gradient(135deg,#1a3a6b,#2a5298);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.card{
  background:#fff;border-radius:20px;padding:40px 32px;width:400px;max-width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;
}
.card .icon{font-size:3em;margin-bottom:12px}
.card h2{font-size:1.3em;color:#1a3a6b;margin-bottom:6px}
.card p{font-size:.82em;color:#888;margin-bottom:24px}
.card input{
  width:100%;padding:14px 16px;border:2px solid #e5e7eb;border-radius:12px;
  font-size:1em;outline:none;text-align:center;letter-spacing:2px;margin-bottom:6px;
}
.card input:focus{border-color:#1a3a6b}
.card .tip{font-size:.68em;color:#999;margin-bottom:16px}
.card button{
  width:100%;padding:14px;background:linear-gradient(135deg,#1a3a6b,#2a5298);
  color:#fff;border:0;border-radius:12px;font-size:1em;font-weight:700;
  cursor:pointer;transition:.2s;
}
.card button:hover{opacity:.9;transform:translateY(-1px)}
.card .err{color:#c41230;font-size:.75em;margin-top:8px;display:none}
.card .err.show{display:block}
.success{display:none}
.success h2{color:#16a34a}
</style>
</head>
<body>

<div class="card" id="loginCard">
  <div class="icon">🔍</div>
  <h2>江苏公考职位筛选系统</h2>
  <p>输入手机号，免费查询7000+编制岗位</p>
  <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
  <div class="tip">仅用于登录验证，不会泄露您的信息</div>
  <button onclick="doLogin()">免费查询</button>
  <div class="err" id="errMsg">请输入正确的11位手机号</div>
</div>

<div class="card success" id="successCard">
  <div class="icon">✅</div>
  <h2>登录成功</h2>
  <p style="margin-bottom:10px">正在跳转到筛岗系统...</p>
  <p style="font-size:.7em;color:#999">如未跳转，<a href="#" id="manualLink">点这里</a></p>
</div>

<script>
// ===== 配置：替换为你的Google Apps Script URL =====
const SHEET_API = 'https://script.google.com/macros/s/AKfycbz9C7vQR2YPgPEuMtz3ti3N42qWsQSa6Bbsk1xp0JXf7JmOtiJZ2uKXp9GPq2Zx77wQ/exec';

// 目标网址
const TARGET_URL = 'https://thanhtientt51-commits.github.io/jiangsu-jobs-2026/';

function doLogin() {
  var phone = document.getElementById('phone').value.trim();
  var err = document.getElementById('errMsg');

  // 验证手机号
  if (!/^1[3-9]\d{9}$/.test(phone)) {
    err.textContent = '请输入正确的11位手机号';
    err.classList.add('show');
    return;
  }
  err.classList.remove('show');

  // 存储手机号（本地）
  var loginData = {
    phone: phone,
    time: new Date().toISOString(),
    ua: navigator.userAgent.substring(0, 100)
  };
  sessionStorage.setItem('gk_user', JSON.stringify(loginData));

  // 发送到Google Sheets（两种方式同时尝试）
  var url = SHEET_API + '?phone=' + encodeURIComponent(phone) + '&time=' + encodeURIComponent(loginData.time) + '&v=2';
  // 方式1：fetch
  fetch(url, { mode: 'no-cors' }).catch(function(){});
  // 方式2：img像素
  var img = new Image();
  img.src = url;

  // 显示成功并跳转
  document.getElementById('loginCard').style.display = 'none';
  document.getElementById('successCard').style.display = 'block';
  document.getElementById('manualLink').href = TARGET_URL;
  setTimeout(function() {
    window.location.href = TARGET_URL;
  }, 1500);
}
</script>

</body>
</html>
