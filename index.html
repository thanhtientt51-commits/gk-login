<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江苏公考职位筛选系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a3a6b,#2a5298);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:20px;padding:40px 32px;width:400px;max-width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.icon{font-size:3em;margin-bottom:12px}
h2{font-size:1.3em;color:#1a3a6b;margin-bottom:6px}
p{font-size:.82em;color:#888;margin-bottom:24px}
input{width:100%;padding:14px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:1em;outline:none;text-align:center;letter-spacing:2px;margin-bottom:6px}
input:focus{border-color:#1a3a6b}
.tip{font-size:.68em;color:#999;margin-bottom:16px}
button{width:100%;padding:14px;background:linear-gradient(135deg,#1a3a6b,#2a5298);color:#fff;border:0;border-radius:12px;font-size:1em;font-weight:700;cursor:pointer}
button:active{opacity:.8}
.err{color:#c41230;font-size:.75em;margin-top:8px}
</style>
</head>
<body>

<div class="card">
  <div class="icon">🔍</div>
  <h2>江苏公考职位筛选系统</h2>
  <p>输入手机号，免费查询7000+编制岗位</p>
  <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
  <div class="tip">仅用于登录验证，不会泄露您的信息</div>
  <button onclick="submitPhone()">免费查询</button>
  <div class="err" id="errMsg"></div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbwkl_XaQ9LSWjl777ceHwxZ3xGZRjAPFttzaXf1qZrRqd8w1eyG7QyrnBq5g8d23LhE/exec';
var TARGET = 'https://thanhtientt51-commits.github.io/jiangsu-jobs-2026/';

function submitPhone() {
  var phone = document.getElementById('phone').value.trim();
  var err = document.getElementById('errMsg');
  if (!/^1[3-9]\d{9}$/.test(phone)) {
    err.textContent = '请输入正确的11位手机号';
    return;
  }
  err.textContent = '';

  // 双保险：发图片给Google表格（WiFi能通）+ 号码带链接跳转
  var img = new Image();
  img.src = API + '?phone=' + encodeURIComponent(phone);
  window.location.href = TARGET + '?phone=' + encodeURIComponent(phone);
}
</script>

</body>
</html>
